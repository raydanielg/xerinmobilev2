org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Kotlin incremental compilation fixes (disabled due to cache issues)
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.incremental.usePreciseJavaTracking=false
kotlin.build.report.output=file

# Gradle daemon configuration
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

# Android build optimizations
android.enableJetifier=true
android.enableR8.fullMode=true
