<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47524;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F47524;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F47524;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F47524;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="160" r="130" fill="url(#bg1)"/>

  <!-- Bar chart -->
  <rect x="100" y="190" width="32" height="70" rx="6" fill="#F47524" opacity="0.4"/>
  <rect x="148" y="160" width="32" height="100" rx="6" fill="#F47524" opacity="0.55"/>
  <rect x="196" y="120" width="32" height="140" rx="6" fill="url(#barGrad)"/>
  <rect x="244" y="145" width="32" height="115" rx="6" fill="#F47524" opacity="0.55"/>
  <rect x="292" y="175" width="32" height="85" rx="6" fill="#F47524" opacity="0.4"/>

  <!-- Trend arrow -->
  <polyline points="100,210 165,175 212,115 265,140 310,185"
    fill="none" stroke="#F47524" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow head -->
  <polyline points="295,170 310,185 301,170"
    fill="none" stroke="#F47524" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Businessman body -->
  <!-- Head -->
  <circle cx="200" cy="52" r="22" fill="#434951"/>
  <!-- Body -->
  <path d="M178,100 L178,75 Q178,68 185,68 L215,68 Q222,68 222,75 L222,100 Z" fill="#434951"/>
  <!-- Tie -->
  <polygon points="196,80 200,98 204,80" fill="#F47524"/>
  <!-- Left arm pointing at chart -->
  <path d="M178,85 L150,110" stroke="#434951" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M222,85 L250,105" stroke="#434951" stroke-width="8" stroke-linecap="round"/>
  <!-- Left leg -->
  <rect x="183" y="100" width="10" height="35" rx="4" fill="#434951"/>
  <!-- Right leg -->
  <rect x="207" y="100" width="10" height="35" rx="4" fill="#434951"/>

  <!-- Floor line -->
  <line x1="80" y1="270" x2="320" y2="270" stroke="#F47524" stroke-width="2" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
