<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47524;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F47524;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F47524;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F47524;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="160" r="130" fill="url(#bg3)"/>

  <!-- Shield -->
  <path d="M200,80 L260,105 L260,165 Q260,210 200,240 Q140,210 140,165 L140,105 Z"
    fill="url(#shieldGrad)" stroke="none"/>

  <!-- Shield outline -->
  <path d="M200,80 L260,105 L260,165 Q260,210 200,240 Q140,210 140,165 L140,105 Z"
    fill="none" stroke="#434951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark -->
  <polyline points="170,165 190,185 230,145"
    fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card -->
  <rect x="155" y="118" width="90" height="60" rx="8" fill="white" opacity="0.85"/>
  <!-- Card chip -->
  <rect x="170" y="130" width="16" height="12" rx="3" fill="#434951" opacity="0.2"/>
  <!-- Card lines -->
  <line x1="170" y1="152" x2="210" y2="152" stroke="#434951" stroke-width="3" opacity="0.12" stroke-linecap="round"/>
  <line x1="170" y1="162" x2="195" y2="162" stroke="#434951" stroke-width="3" opacity="0.08" stroke-linecap="round"/>

  <!-- Lock icon -->
  <rect x="218" y="148" width="18" height="14" rx="3" fill="#F47524"/>
  <path d="M221,152 L221,148 Q221,143 227,143 Q233,143 233,148 L233,152"
    fill="none" stroke="#F47524" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="227" cy="156" r="2" fill="white"/>

  <!-- Decorative circles -->
  <circle cx="130" cy="130" r="6" fill="#F47524" opacity="0.12"/>
  <circle cx="270" cy="200" r="8" fill="#F47524" opacity="0.1"/>
  <circle cx="145" cy="215" r="4" fill="#F47524" opacity="0.08"/>
  <circle cx="265" cy="115" r="5" fill="#F47524" opacity="0.15"/>
</svg>
